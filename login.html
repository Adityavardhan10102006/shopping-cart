<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | My Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your My Shop account</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required />
    </div>

    <button class="btn-primary" onclick="window.location.href='index.html'">Sign In</button>

    <p class="register-link">Don't have an account? <a href="#">Register</a></p>
  </div>
</body>
</html>
