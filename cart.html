<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart | My Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">My Shop</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="cart.html" class="active">Cart</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <div class="container">
    <div class="cart-box">
      <h2>Your Cart</h2>

      <div class="cart-item">
        <img src="OIP.png" alt="T-Shirt">
        <div class="cart-item-info">
          <h4>Classic T‑Shirt</h4>
          <p>Qty: 1</p>
        </div>
        <div class="cart-item-price">₹599</div>
      </div>

      <div class="cart-item">
        <img src="OIP1.png" alt="Headphones">
        <div class="cart-item-info">
          <h4>Wireless Headphones</h4>
          <p>Qty: 1</p>
        </div>
        <div class="cart-item-price">₹1,999</div>
      </div>

      <div class="cart-total">
        <div>Total <span>₹2,598</span></div>
        <a href="#" class="btn-primary">Checkout</a>
      </div>
    </div>
  </div>

  <footer>© 2025 My Shop · All rights reserved</footer>
</body>
</html>
